# Opt-in HelpOfAi toolbox workflow.
#
# Usage:
#   HELPOFAI_IMAGE=ghcr.io/helpofai/helpofai:vX.Y.Z \
#   HELPOFAI_TOOLBOX_IMAGE=helpofai-toolbox:my-project \
#   HELPOFAI_HOME_VOLUME=helpofai-my-project-home \
#   HELPOFAI_WORKSPACE="$PWD" \
#   docker compose -f docs/examples/compose.toolbox.yml run --rm helpofai
#
# Keep HELPOFAI_HOME_VOLUME distinct per project so sessions, config, skills,
# memory, and queued work do not bleed across workspaces.

services:
  helpofai:
    image: ${HELPOFAI_TOOLBOX_IMAGE:-helpofai-toolbox:local}
    build:
      context: ../..
      dockerfile: docs/examples/Dockerfile.toolbox
      args:
        HELPOFAI_IMAGE: ${HELPOFAI_IMAGE:-ghcr.io/helpofai/helpofai:latest}
        TOOLBOX_PACKAGES: ${TOOLBOX_PACKAGES:-git openssh-client curl build-essential pkg-config python3 python3-pip nodejs npm}
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL
      - DEEPSEEK_NO_COLOR
    volumes:
      - helpofai-home:/home/helpofai/.helpofai
      - ${HELPOFAI_WORKSPACE:?set HELPOFAI_WORKSPACE to the project directory}:/workspace
      # Mount SSH material only for projects that need it, and prefer read-only.
      # - ${HOME}/.ssh:/home/helpofai/.ssh:ro
      # Mount local CA certificates only when starting through a command that
      # runs `sudo update-ca-certificates` inside this toolbox image.
      # - ${HELPOFAI_CERTS_DIR:-../../docker/certs}:/usr/local/share/ca-certificates/local:ro
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  helpofai-home:
    name: ${HELPOFAI_HOME_VOLUME:-helpofai-toolbox-home}
